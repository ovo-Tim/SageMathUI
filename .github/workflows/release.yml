name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Lite builds (no bundled SageMath) ──────────────────────
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            variant: lite
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
            variant: lite
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
            variant: lite
          - platform: windows-latest
            args: ""
            rust_targets: ""
            variant: lite

          # ── Full builds (bundled Python + SymPy) ───────────────────
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            variant: full
            python_triple: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
            variant: full
            python_triple: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
            variant: full
            python_triple: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            rust_targets: ""
            variant: full
            python_triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.variant }}

      - name: Cache SageMath desktop bundle
        if: matrix.variant == 'full'
        id: sagemath-cache
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/sagemath-bundle.tar.gz
          key: sagemath-desktop-${{ matrix.python_triple }}-${{ hashFiles('scripts/desktop-sagemath/bundle.sh') }}

      - name: Build SageMath desktop bundle
        if: matrix.variant == 'full' && steps.sagemath-cache.outputs.cache-hit != 'true'
        shell: bash
        run: ./scripts/desktop-sagemath/bundle.sh ${{ matrix.python_triple }}
        timeout-minutes: 15

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SageMath UI ${{ github.ref_name }}"
          releaseBody: "See the assets for download links."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --config src-tauri/tauri.${{ matrix.variant }}.conf.json

  android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool texinfo \
            cmake ninja-build pkg-config \
            m4 perl python3 python3-pip

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android NDK
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "platforms;android-24" \
            "build-tools;35.0.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Cache SageMath cross-compilation
        uses: actions/cache@v4
        with:
          path: sagemath-android/install
          key: sagemath-android-aarch64-${{ hashFiles('scripts/android-sagemath/*.sh') }}

      - name: Cross-compile SageMath stack
        run: ./scripts/android-sagemath/build-all.sh --target aarch64
        timeout-minutes: 90

      - name: Bundle SageMath assets
        run: |
          PREFIX=sagemath-android/install/aarch64-linux-android
          echo "=== Install prefix contents ==="
          find "$PREFIX" -maxdepth 2 -type d || true
          cd "$PREFIX"
          tar czf ../../sagemath-bundle.tar.gz .

      - name: Install frontend dependencies
        run: pnpm install

      - name: Initialize Tauri Android project
        run: pnpm tauri android init

      - name: Copy assets into APK
        run: |
          ASSETS=src-tauri/gen/android/app/src/main/assets
          mkdir -p "$ASSETS"
          cp sagemath-android/sagemath-bundle.tar.gz "$ASSETS/"
          cp src-tauri/sage_bridge.py "$ASSETS/"

      - name: Build Android APK
        run: pnpm tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
