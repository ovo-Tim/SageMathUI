name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Lite builds (no bundled SageMath) ──────────────────────
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            variant: lite
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
            variant: lite
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
            variant: lite
          - platform: windows-latest
            args: ""
            rust_targets: ""
            variant: lite

          # ── Full builds (bundled Python + SymPy) ───────────────────
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            variant: full
            python_triple: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
            variant: full
            python_triple: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
            variant: full
            python_triple: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            rust_targets: ""
            variant: full
            python_triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.variant }}

      - name: Cache SageMath desktop bundle
        if: matrix.variant == 'full'
        id: sagemath-cache
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/sagemath-bundle.tar.gz
          key: sagemath-desktop-${{ matrix.python_triple }}-${{ hashFiles('scripts/desktop-sagemath/bundle.sh') }}

      - name: Build SageMath desktop bundle
        if: matrix.variant == 'full' && steps.sagemath-cache.outputs.cache-hit != 'true'
        shell: bash
        run: ./scripts/desktop-sagemath/bundle.sh ${{ matrix.python_triple }}
        timeout-minutes: 15

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SageMath UI ${{ github.ref_name }}"
          releaseBody: "See the assets for download links."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --config src-tauri/tauri.${{ matrix.variant }}.conf.json

  android:
    runs-on: ubuntu-22.04
    env:
      ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android NDK
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "platforms;android-24" \
            "build-tools;35.0.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache Android Python
        id: android-python-cache
        uses: actions/cache@v4
        with:
          path: android-python-prefix
          key: android-python-3.13.3-aarch64-ndk27-${{ hashFiles('scripts/bundle-android-python.sh') }}

      - name: Cross-compile Python 3.13 for Android
        if: steps.android-python-cache.outputs.cache-hit != 'true'
        run: |
          NDK=$ANDROID_SDK_ROOT/ndk/27.0.12077973
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          wget -q https://www.python.org/ftp/python/3.13.3/Python-3.13.3.tgz
          tar xf Python-3.13.3.tgz
          cd Python-3.13.3

          # Build host Python first (needs native compiler, NOT cross-compiler)
          mkdir -p build-host && cd build-host
          ../configure --prefix="$(pwd)/prefix" -q
          make -j"$(nproc)" -s
          make install -s
          HOST_PYTHON="$(pwd)/prefix/bin/python3.13"
          cd ..

          # Now set cross-compiler for Android build
          export CC=$TOOLCHAIN/bin/aarch64-linux-android24-clang
          export CXX=$TOOLCHAIN/bin/aarch64-linux-android24-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          export READELF=$TOOLCHAIN/bin/llvm-readelf
          export CFLAGS="-O2 -fPIC"

          mkdir -p cross-build && cd cross-build

          # Disable C extension modules that need system libraries not in NDK
          cat > ../Modules/Setup.local << 'SETUP'
          *disabled*
          _lzma
          _bz2
          _ssl
          _hashlib
          readline
          _curses
          _curses_panel
          _sqlite3
          _uuid
          _ctypes
          _posixshmem
          _blake2
          SETUP

          ../configure \
            --host=aarch64-linux-android24 \
            --build=x86_64-linux-gnu \
            --with-build-python="$HOST_PYTHON" \
            --enable-shared \
            --without-ensurepip \
            --without-doc-strings \
            --disable-test-modules \
            --prefix="$(pwd)/prefix" \
            ac_cv_buggy_getaddrinfo=no \
            ac_cv_file__dev_ptmx=yes \
            ac_cv_file__dev_ptc=no \
            -q
          make -j"$(nproc)" -s 2>&1 || {
            echo "=== Cross-build failed ==="
            make -j1 2>&1 | tail -50
            exit 1
          }
          make install -s

          cp -a prefix "$GITHUB_WORKSPACE/android-python-prefix"
        timeout-minutes: 30

      - name: Install frontend dependencies
        run: pnpm install

      - name: Initialize Tauri Android project
        run: pnpm tauri android init

      - name: Bundle Android Python assets
        run: |
          export PROJECT_ROOT="$GITHUB_WORKSPACE"
          export CROSS_PREFIX="$GITHUB_WORKSPACE/android-python-prefix"
          export NDK_HOME="$ANDROID_SDK_ROOT/ndk/27.0.12077973"
          ./scripts/bundle-android-python.sh

      - name: Setup Android signing
        if: env.ANDROID_KEY_BASE64 != ''
        run: |
          printf '%s' "$ANDROID_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          keytool -list -keystore "$RUNNER_TEMP/keystore.jks" -storepass "$ANDROID_KEY_PASSWORD" -alias "$ANDROID_KEY_ALIAS" > /dev/null
          echo "storeFile=$RUNNER_TEMP/keystore.jks" > src-tauri/gen/android/keystore.properties
          echo "storePassword=$ANDROID_KEY_PASSWORD" >> src-tauri/gen/android/keystore.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> src-tauri/gen/android/keystore.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> src-tauri/gen/android/keystore.properties

      - name: Build Android APK
        run: pnpm tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
