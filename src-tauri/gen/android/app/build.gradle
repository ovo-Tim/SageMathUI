plugins {
    id "com.android.application"
    id "kotlin-android"
}

android {
    compileSdk 34

    defaultConfig {
        applicationId "com.sagemath.ui"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "0.1.0"

        // Configure NDK for native code
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
                cFlags "-std=c11"
                arguments "-DANDROID_PLATFORM=android-21",
                          "-DANDROID_STL=c++_shared"
            }
        }

        ndk {
            abiFilters "arm64-v8a"  // aarch64 for Termux bootstrap
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // Configure native build (NDK)
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    // Build output
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            outputFileName = "sage-ui-${variant.versionName}-${variant.buildType.name}.apk"
        }
    }
}

dependencies {
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "com.google.android.material:material:1.11.0"
    implementation "androidx.constraintlayout:constraintlayout:2.1.4"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
}
